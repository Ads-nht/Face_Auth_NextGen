# ==============================================================================
# FaceAuth NextGen - Yapılandırma Dosyası (v0.1 Premium Passive Phone-ID)
# ==============================================================================
# Bu dosya /etc/faceauth.conf konumunda saklanır ve tüm yüz tanıma
# parametrelerini dinamik olarak kontrol eder.

[General]
# Anti-spoofing (fotoğraf/ekran engelleme) yöntemi.
# Seçenekler:
#  - "minifas"  : (ÖNERİLEN) ONNX MiniFASNet yapay zeka modeliyle arka planda pasif canlılık analizi yapar.
#                 Kullanıcının hiçbir hareket yapmasına gerek yoktur. Ultra hızlı ve güvenlidir.
#  - "texture"  : Kenar keskinliği (Laplacian Varyansı) ve HSV renk doygunluğu analizi yapar.
#  - "none"     : Fotoğraf algılama korumasını tamamen kapatır.
# Varsayılan: minifas
liveness_method = minifas

# Yüz eşleşme (SFace) benzerlik eşiği (Cosine Similarity: 0.0 ile 1.0 arası).
# Varsayılan: 0.45
matching_threshold = 0.45

# --- DOKU ANALİZİ PARAMETRELERİ (liveness_method = texture iken) ---
[Texture]
texture_min_laplacian = 380.0
texture_max_laplacian = 1500.0
texture_min_hsv_sat = 95.0
texture_max_hsv_sat = 190.0

# --- YAPAY ZEKA PARAMETRELERİ (liveness_method = minifas iken) ---
[MiniFASNet]
# MiniFASNet logit fark eşiği (Real - Spoof)
# Varsayılan: 1.5
minifas_threshold = 1.5

# --- ORTAM KOŞULLARI ---
[Environment]
# Güvenilir yüz tanıma için gereken minimum ortalama parlaklık değeri (0 - 255).
# Varsayılan: 35.0
min_brightness = 35.0

# Akıllı Adaptif Pozlama Dengelenmesi (CLAHE - Contrast Limited Adaptive Histogram Equalization).
# Düşük ışıklı ortamlarda (gece sadece ekran ışığında) veya ters ışık parlamalarında
# kontrastı bloklar halinde dengeleyerek yüz algılamayı üst seviyeye çıkartır.
# Varsayılan: true
enable_adaptive_exposure = true
